name: Deploy Blog Preview

on:
  push:
    branches:
      - main
    paths:
      - '004-blog-preview-card/**'
      - '.github/workflows/004.yaml'
  
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: |
          cd 004-blog-preview-card
          npm install
          npm run generate

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: 004-blog-preview-card/.output/public
          destination_dir: 004-blog-preview-card
    
      - name: Show GitHub Pages URL
        run: |
          echo ""
          echo "🚀 GitHub Pages deployed successfully!"
          echo ""
          echo "📄 URL:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/004-blog-preview-card/"
          echo ""